apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: expense
  labels:
    name: app1
    tier: web
    project: expense  
spec:
  replicas: 1
  selector:
    matchLabels:
      name: app1
      tier: web
      project: expense
  template:
    metadata:
      labels:
        name: app1
        tier: web
        project: expense 
    spec:
      containers:
      - name: app1-expense
        image: vamsidocker012/app1:v1
---
apiVersion: v1
kind: Service
metadata:
  name: app1
  namespace: expense
  labels:  
    name: app1
    tier: web
    project: expense
spec:
  selector:
      name: app1
      tier: web
      project: expense
  ports:
    - name: frontend-ports
      protocol: TCP
      port: 80
      targetPort: 80
